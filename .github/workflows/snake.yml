name: Generate Datas

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checkout the repository to ensure all actions run correctly
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Fix folder permissions to prevent EACCES (Permission Denied) errors in subsequent steps
      - name: Fix permissions
        run: |
          sudo mkdir -p dist
          sudo chmod -R 777 dist
          sudo chown -R runner:docker dist

      # Generate the Snake Game SVGs
      - name: generate snake game
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=orange&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-contribution-grid-snake-dark.svg?color_snake=orange&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
        env:
          GITHUB_TOKEN: ${{ secrets.SNAKE_TOKEN || secrets.GITHUB_TOKEN }}

      # Generate the Pac-Man Game SVGs
      - name: generate pacman contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'pacman' # Options: pacman, breakout, galaga

      # Push all SVGs (both Snake and Pacman) to the output branch
      - name: push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.SNAKE_TOKEN || secrets.GITHUB_TOKEN }}
